<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Créer un ticket</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/sidebar.css">
  <link rel="stylesheet" href="static/ticket-create.css">
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        </div>
      </div>

      <a class="nav-item" href="dashboard.html">Dashboard</a>
      <a class="nav-item active" href="ticket-dashboard/ticket-dashboard.html">Tickets</a>
      <a class="nav-item" href="clients.html">Clients</a>
      <a class="nav-item" href="#">Appareils</a>
      <a class="nav-item" href="#">Alertes</a>
      <a class="nav-item" href="#">Messages</a>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div class="search-container">
          <div class="search-block">
            <button type="button">Nouveau \/</button>

            <div class="search-bar">
              <input type="search" placeholder="Rechercher...">
            </div>
          </div>

          <div class="profil-block">
            <button type="button">Installer un agent</button>
            <div class="profil-container">
              <button type="button">cloche</button>
              <button type="button">profil</button>
            </div>
          </div>
        </div>

        <div class="ticket-create-block">
          <h1>New ticket</h1>

          <div class="cancel-create">
            <button type="button" id="cancel-btn">cancel</button>
            <button type="submit" form="ticket-form" id="create-ticket-btn">create</button>
          </div>
        </div>
      </div>

      <div class="ticket-container">
        <form class="left-part" id="ticket-form">
          <section class="card">
            <h2>Customer</h2>
            <div class="field">
              <input type="text" id="customer-display" placeholder="Select customer" readonly>
            </div>

            <h2>Contact</h2>
            <div class="field">
              <input type="text" id="contact-input" placeholder="Search contacts">
            </div>

            <div class="field">
              <button class="add-contact-btn" type="button">
                Add contact
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                  <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.3" />
                  <line x1="8" y1="4.5" x2="8" y2="11.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                  <line x1="4.5" y1="8" x2="11.5" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                </svg>
              </button>
            </div>

            <h2>Ticket Title</h2>
            <div class="field">
              <input type="text" id="ticket-title" placeholder="Add summary..." required>
            </div>

            <h2>Description</h2>
            <div class="field">
              <textarea id="ticket-description" placeholder="Enter ticket detail here..." required></textarea>
            </div>

            <div class="date-container">
              <div class="calendar"></div>

              <div class="date-info">
                <div class="field">
                  <label for="start-date">Start date*</label>
                  <input type="date" id="start-date">
                </div>

                <div class="field">
                  <label for="end-date">End date*</label>
                  <input type="date" id="end-date">
                </div>
              </div>
            </div>
          </section>
        </form>

        <div class="right-part">
          <section class="card">
            <h2>Ticket assignement and type</h2>

            <div class="field">
              <label for="customer-select">Customer</label>
              <select id="customer-select" required>
                <option value="">Select customer</option>
              </select>
            </div>

            <div class="field">
              <label for="agent-select">Assign technician</label>
              <select id="agent-select" required>
                <option value="">Choose technician</option>
              </select>
            </div>

            <div class="field">
              <label for="ticket-type">Type</label>
              <select id="ticket-type" required>
                <option value="incident">Incident</option>
                <option value="maintenance">Maintenance</option>
                <option value="command">Commande</option>
              </select>
            </div>

            <div class="field">
              <label for="contract-select">Contract</label>
              <select id="contract-select">
                <option value="">Select contract</option>
              </select>
            </div>
          </section>

          <section class="card">
            <h2>Ticket priorities</h2>

            <div class="field">
              <label for="template-select">Form template</label>
              <select id="template-select">
                <option value="">Please select</option>
              </select>
            </div>

            <div class="field">
              <label for="priority-select">Priority</label>
              <select id="priority-select">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
                <option value="critical">Critical</option>
              </select>
            </div>

            <div class="field">
              <label for="impact-select">Impact</label>
              <select id="impact-select">
                <option value="incident">Incident</option>
                <option value="minor">Minor</option>
                <option value="major">Major</option>
              </select>
            </div>

            <div class="field">
              <label for="product-family-select">Product family</label>
              <select id="product-family-select">
                <option value="">Please select</option>
              </select>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="./static/ticket-create.js"></script>
</body>
</html>
