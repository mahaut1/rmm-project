<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/sidebar.css">
  <link rel="stylesheet" href="static/ticket-create.css">
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        </div>
      </div>
      <a class="nav-item" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
        Dashboard
      </a>
      <a class="nav-item" href="ticket-dashboard/ticket-dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
        </svg>
        Tickets
      </a>
      <a class="nav-item active" href="ticket-create.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75" />
        </svg>
        Clients
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <path d="M8 21h8M12 17v4" />
        </svg>
        Appareils
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 01-3.46 0" />
        </svg>
        Alertes
      </a>
      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        Messages
      </a>
    </aside>

    <main class="main-content">
      <div class="top-bar">
        <div class="search-container">
          <div class="search-block">
            <button>Nouveau \/</button>
            <div class="search-bar">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="11" cy="11" r="8"></circle>
                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
              </svg>
              <input type="search" placeholder="Rechercher...">
            </div>
          </div>
          <div class="profil-block">
            <button>Installer un agent</button>
            <div class="profil-container">
              <button>cloche</button>
              <button>profil</button>
            </div>
          </div>
        </div>
        <div class="ticket-create-block">
          <h1>New ticket</h1>
          <div class="cancel-create">
            <button>cancel</button>
            <button>create</button>
          </div>
        </div>
      </div>

      <div class="ticket-container">

        <form class="left-part">
          <section class="card">

            <h2>Customer</h2>
            <div class="field">
              <input type="text" placeholder="Select customer">
            </div>

            <h2>Contact</h2>
            <div class="field">
              <input type="text" placeholder="Search contacts">
            </div>
            <div class="field">
              <button class="add-contact-btn" type="button">
                Add contact
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.3" />
                  <line x1="8" y1="4.5" x2="8" y2="11.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                  <line x1="4.5" y1="8" x2="11.5" y2="8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                </svg>
              </button>
            </div>

            <h2>Ticket Title</h2>
            <div class="field">
              <input type="text" placeholder="Add summary...">
            </div>

            <h2>Description</h2>
            <div class="field">
              <textarea placeholder="Enter ticket detail here..."></textarea>
            </div>

            <div class="date-container">
              <div class="calendar"></div>
              <div class="date-info">
                <div class="field">
                  <label>Start date*</label>
                  <input type="date">
                </div>
                <div class="field">
                  <label>End date*</label>
                  <input type="date">
                </div>
              </div>
            </div>

          </section>
        </form>

        <div class="right-part">

          <section class="card">
            <h2>Ticket assignement and type</h2>

            <div class="field">
              <label>Customer</label>
              <select>
                <option>Select customer</option>
              </select>
            </div>

            <div class="field">
              <label>Assign technician</label>
              <select>
                <option>Choose technician</option>
              </select>
            </div>

            <div class="field">
              <label>Type</label>
              <select>
                <option>Incident</option>
              </select>
            </div>

            <div class="field">
              <label>Contract</label>
              <select>
                <option>Select contract</option>
              </select>
            </div>
          </section>

          <section class="card">
            <h2>Ticket priorities</h2>

            <div class="field">
              <label>Form template</label>
              <select>
                <option>Please select</option>
              </select>
            </div>

            <div class="field">
              <label>Priority</label>
              <select>
                <option>Select priority</option>
              </select>
            </div>

            <div class="field">
              <label>Impact</label>
              <select>
                <option>Incident</option>
              </select>
            </div>

            <div class="field">
              <label>Product family</label>
              <select>
                <option>Please select</option>
              </select>
            </div>
          </section>

        </div>

      </div>
    </main>
  </div>
</body>

</html>
