<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clients - Simony</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/sidebar.css">
  <link rel="stylesheet" href="static/clients.css">
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        </div>
      </div>

      <a class="nav-item" href="dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" />
          <rect x="14" y="3" width="7" height="7" />
          <rect x="3" y="14" width="7" height="7" />
          <rect x="14" y="14" width="7" height="7" />
        </svg>
        Dashboard
      </a>

      <a class="nav-item" href="ticket-dashboard/ticket-dashboard.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
        </svg>
        Tickets
      </a>

      <a class="nav-item active" href="clients.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
          <circle cx="9" cy="7" r="4" />
          <path d="M23 21v-2a4 4 0 00-3-3.87m-4-12a4 4 0 010 7.75" />
        </svg>
        Clients
      </a>

      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="2" y="3" width="20" height="14" rx="2" />
          <path d="M8 21h8M12 17v4" />
        </svg>
        Appareils
      </a>

      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 01-3.46 0" />
        </svg>
        Alertes
      </a>

      <a class="nav-item" href="#">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
        </svg>
        Messages
      </a>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-light" type="button">Nouveau⌄</button>

          <div class="global-search">
            <span>⌕</span>
            <input type="search" placeholder="Rechercher">
          </div>
        </div>

        <div class="topbar-right">
          <button class="btn-light" type="button">Installer un agent</button>
          <button class="round-btn" type="button">⌂</button>
          <button class="round-btn" type="button">?</button>
          <button class="round-btn avatar" type="button">👤</button>
        </div>
      </header>

      <section class="page-content container">
        <div class="page-header">
          <h1>Clients</h1>
          <button class="btn-primary" id="new-client-btn" type="button">Nouveau client</button>
        </div>

        <div class="client-card">
          <div class="filters-row">
            <div class="search-input">
              <span>⌕</span>
              <input id="client-search" type="search" placeholder="Rechercher">
            </div>

            <button class="filter-btn" type="button">Pays</button>
            <button class="filter-btn" type="button">Région</button>
            <button class="filter-btn" type="button">Rang</button>

            <button class="settings-btn" type="button">☰</button>
          </div>

          <div class="actions-row">
            <button class="delete-btn" type="button">Supprimer</button>
            <span id="display-count">Affichage de 0 client</span>
          </div>

          <div class="clients-table">
            <div class="table-row table-header">
              <div><input type="checkbox"></div>
              <div>Nom</div>
              <div>Unmonitored devices</div>
              <div>Téléphone</div>
              <div>Adresse</div>
              <div>Contact</div>
              <div>Rang</div>
            </div>

            <div id="clients-list">
              <div class="table-row">
                <div></div>
                <div>Chargement des clients...</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./static/clients.js"></script>
</body>
</html>
