<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alertes - Simony</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/sidebar.css">
  <link rel="stylesheet" href="static/alertes.css">
</head>

<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5-10-5" />
          </svg>
        </div>
      </div>

      <a class="nav-item" href="dashboard.html">Dashboard</a>
      <a class="nav-item" href="ticket-dashboard/ticket-dashboard.html">Tickets</a>
      <a class="nav-item" href="clients.html">Clients</a>
      <a class="nav-item" href="appareils.html">Appareils</a>
      <a class="nav-item active" href="alertes.html">Alertes</a>
      <a class="nav-item" href="#">Messages</a>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <div class="topbar-left">
          <button class="btn-light" type="button">Nouveau⌄</button>

          <div class="global-search">
            <span>⌕</span>
            <input type="search" placeholder="Rechercher">
          </div>
        </div>

        <div class="topbar-right">
          <button class="btn-light" type="button">Installer un agent</button>
          <button class="round-btn" type="button">⌂</button>
          <button class="round-btn" type="button">?</button>
          <button class="round-btn avatar" type="button">👤</button>
        </div>
      </header>

      <section class="page-content container">
        <div class="page-header">
          <h1>Alertes</h1>
        </div>

        <div class="alerts-card">
          <div class="filters-row">
            <div class="search-input">
              <span>⌕</span>
              <input id="alert-search" type="search" placeholder="Rechercher">
            </div>

            <button class="filter-btn active" type="button">Filtres · 2</button>
            <button class="settings-btn" type="button">☰</button>
          </div>

          <div class="actions-row">
            <div class="actions-left">
              <button type="button">Supprimer</button>
              <button type="button">Répéter</button>
              <button type="button" id="resolve-selected-btn">Résoudre</button>
            </div>

            <span id="display-count">Nombre d’alertes actuellement affichées : 0</span>
          </div>

          <div class="alerts-table">
            <div class="table-row table-header">
              <div><input type="checkbox" id="select-all-alerts"></div>
              <div>Détails</div>
              <div>Créé</div>
              <div>Niveau de sévérité</div>
              <div>Catégorie</div>
              <div>Ticket</div>
              <div>Statut</div>
              <div>Gérer le périphérique</div>
            </div>

            <div id="alerts-list">
              <div class="table-row">
                <div></div>
                <div>Chargement des alertes...</div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script type="module" src="./static/alertes.js"></script>
</body>
</html>
